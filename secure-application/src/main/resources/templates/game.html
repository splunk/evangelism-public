<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>The Door Game</title>
    <style>
        body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { text-align: center; }
        .doors { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .door { width: 100px; height: 150px; border: 3px solid #333; display: flex;
                align-items: center; justify-content: center; font-size: 24px; cursor: pointer;
                background: #8B4513; color: white; }
        .door:hover { background: #A0522D; }
        .door.revealed { background: #ccc; color: #666; cursor: default; }
        .door.prize { background: #228B22; }
        .door.empty { background: #8B0000; }
        .controls { text-align: center; margin: 20px 0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px;
                 font-family: monospace; }
        .result { text-align: center; font-size: 20px; margin: 20px 0; }
        .win { color: #228B22; font-weight: bold; }
        .lose { color: #8B0000; font-weight: bold; }
    </style>
</head>
<body>
    <h1>The Door Game</h1>
    <p style="text-align:center;">A Monty Hall Problem Simulator</p>

    <!-- Stage 1: Pick a door -->
    <div th:if="${stage == 'pick'}">
        <p style="text-align:center;">Pick a door. Behind one is a prize!</p>
        <div class="doors">
            <form th:each="d : ${#numbers.sequence(1,3)}" method="post" action="/pick" style="display:inline;">
                <input type="hidden" name="door" th:value="${d}"/>
                <button type="submit" class="door" th:text="'Door ' + ${d}">Door</button>
            </form>
        </div>
    </div>

    <!-- Stage 2: Switch or stay -->
    <div th:if="${stage == 'switch'}">
        <p style="text-align:center;">
            You picked <strong th:text="'Door ' + ${picked}">Door</strong>.
            I'll reveal that <strong th:text="'Door ' + ${revealed}">Door</strong> is empty!
        </p>
        <div class="doors">
            <div th:each="d : ${#numbers.sequence(1,3)}"
                 th:class="${d == revealed} ? 'door revealed' : 'door'"
                 th:text="${d == revealed} ? 'Empty' : ('Door ' + ${d})">
            </div>
        </div>
        <div class="controls">
            <p>Do you want to switch your choice?</p>
            <form method="post" action="/decide" style="display:inline;">
                <input type="hidden" name="picked" th:value="${picked}"/>
                <input type="hidden" name="prizeDoor" th:value="${prizeDoor}"/>
                <input type="hidden" name="revealed" th:value="${revealed}"/>
                <input type="hidden" name="switchDoor" value="false"/>
                <button type="submit">Stay with Door <span th:text="${picked}">1</span></button>
            </form>
            <form method="post" action="/decide" style="display:inline;">
                <input type="hidden" name="picked" th:value="${picked}"/>
                <input type="hidden" name="prizeDoor" th:value="${prizeDoor}"/>
                <input type="hidden" name="revealed" th:value="${revealed}"/>
                <input type="hidden" name="switchDoor" value="true"/>
                <button type="submit">Switch to Door <span th:text="${6 - picked - revealed}">2</span></button>
            </form>
        </div>
    </div>

    <!-- Stage 3: Result -->
    <div th:if="${stage == 'result'}">
        <div class="doors">
            <div th:each="d : ${#numbers.sequence(1,3)}"
                 th:class="${d == prizeDoor} ? 'door prize' : 'door empty'"
                 th:text="${d == prizeDoor} ? 'PRIZE!' : 'Empty'">
            </div>
        </div>
        <div class="result">
            <p th:if="${won}" class="win">
                You <span th:text="${switched} ? 'switched' : 'stayed'">chose</span>
                and picked Door <span th:text="${finalDoor}">1</span>. YOU WIN!
            </p>
            <p th:if="${!won}" class="lose">
                You <span th:text="${switched} ? 'switched' : 'stayed'">chose</span>
                and picked Door <span th:text="${finalDoor}">1</span>. The prize was behind
                Door <span th:text="${prizeDoor}">2</span>. YOU LOSE!
            </p>
        </div>
        <div class="controls">
            <a href="/"><button>Play Again</button></a>
        </div>
    </div>
</body>
</html>
